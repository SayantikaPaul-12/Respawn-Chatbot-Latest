version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing AWS CDK CLI..."
      - npm install -g aws-cdk
      - echo "Installing CDK dependencies..."
      - cd backend/infrastructure/cdk && npm ci && cd ../../..

  pre_build:
    commands:
      - echo "Bootstrapping CDK..."
      - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - >-
        cd backend/infrastructure/cdk &&
        npx cdk bootstrap aws://${AWS_ACCOUNT_ID}/${AWS_REGION} --require-approval never &&
        cd ../../..

  build:
    commands:
      - >-
        cd backend/infrastructure/cdk &&
        if [ "$ACTION" = "destroy" ]; then
          echo "Destroying stack...";
          npx cdk destroy --all --force
            --region ${AWS_REGION};
        else
          echo "Deploying stack...";
          npx cdk deploy --all --require-approval never
            --region ${AWS_REGION}
            --parameters AmplifyRepository="${AMPLIFY_REPOSITORY}"
            --parameters AmplifyOauthToken="${AMPLIFY_OAUTH_TOKEN}"
            --parameters AmplifyBranch="${AMPLIFY_BRANCH}";
        fi &&
        cd ../../..

  post_build:
    commands:
      - echo "CDK $ACTION complete."
